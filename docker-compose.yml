services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kpss_ai_tarih
    ports:
      - "5432:5432"
    volumes:
      - kpss_pg_data:/var/lib/postgresql/data

volumes:
  kpss_pg_data:
